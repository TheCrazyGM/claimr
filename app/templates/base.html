<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RC Cost Chart</title>
    <meta
      name="description"
      content="Track Hive Resource Credit (RC) claim costs over time. Visualize, analyze, and claim accounts easily."
    />
    <link rel="shortcut icon" href="{{ url_for('static', filename='img/lightning-charge.svg') }}" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet" />
  </head>

  <body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg claimr-nav">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="/" aria-label="RC Cost Chart Home">
          <span class="claimr-brand-mark me-2">
            <i class="bi bi-lightning-charge-fill" aria-hidden="true"></i>
          </span>
          <span>Claimr</span>
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-2">
            <li class="nav-item">
              <a class="nav-link active" href="/" aria-current="page">
                <i class="bi bi-house-door me-1"></i>Home
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('main.claim_account') }}">
                <i class="bi bi-person-plus me-1"></i>Create Hive Account
              </a>
            </li>
            <li class="nav-item">
              <a
                class="nav-link"
                href="https://tools.crypto-dreamr.com"
                target="_blank"
                rel="noopener noreferrer"
              >
                <i class="bi bi-box-arrow-up-right me-1"></i>tools.crypto-dreamr.com
              </a>
            </li>
            <!--
            <li class="nav-item">
              <a class="nav-link" href="#">Other Link</a>
            </li>
            -->
          </ul>
          <ul class="navbar-nav ms-auto">
            <!-- Future: settings/user menu here -->
          </ul>
        </div>
      </div>
    </nav>
    <main class="claimr-shell">
      {% block content %}{% endblock %}
    </main>
    <footer class="footer mt-5 py-3 border-top">
      <div class="container text-center">
        <div>&copy; 2026 Sustainable Resource and Business Development Enterprise</div>
        <div class="mt-2">
          <a href="https://tools.crypto-dreamr.com/give/mithril.donation/2/HBD/Buy%20a%20coffee" target="_blank" class="text-decoration-none">
            <i class="bi bi-cup-hot"></i> Buy us a coffee
          </a>
        </div>
      </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
