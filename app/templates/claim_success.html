{% extends "base.html" %}

{% block content %}
  <div class="container claimr-page">
    <section class="claimr-panel claimr-success-panel">
      <div class="claimr-panel-body">
        <div class="claimr-metric-icon mx-auto mb-3">
          <i class="bi bi-check-circle-fill"></i>
        </div>
        <div class="claimr-kicker">Broadcast complete</div>
        <h1 class="h2 fw-bold mb-3">Account Created</h1>
        {% if acc %}
          <p class="lead text-muted">
            Your new account <strong>@{{ acc }}</strong> has been successfully created.
          </p>
        {% endif %}
        <div class="d-flex flex-wrap justify-content-center gap-2 mt-4">
          {% if tx %}
            <a href="https://hivehub.dev/tx/{{ tx }}" target="_blank" class="btn btn-outline-primary">
              <i class="bi bi-link-45deg"></i> View Transaction
            </a>
          {% endif %}
          <a href="{{ url_for('main.claim_account') }}" class="btn btn-primary">
            <i class="bi bi-person-plus"></i> Create Another
          </a>
          <a href="{{ url_for('main.index') }}" class="btn btn-outline-secondary">
            <i class="bi bi-house"></i> Back to Console
          </a>
        </div>
      </div>
    </section>
  </div>
{% endblock %}
